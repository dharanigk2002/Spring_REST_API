spring.application.name=employee_api
spring.main.banner-mode=off

spring.datasource.url=jdbc:mysql://localhost:3306/employee_directory
spring.datasource.username=root
spring.datasource.password=user

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format-sql=true
spring.jpa.hibernate.ddl-auto=update

logging.level.root=warn
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# Custom configuration for springdoc-swagger-ui
# /swagger-ui/index.html -> /ui-doc
#springdoc.swagger-ui.path=/ui-doc.html

# Custom config for api docs
# /v3/api-docs -> json
# /v3/api-docs.yaml -> YAML download file
#springdoc.api-docs.path=/my-api-docs